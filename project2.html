<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 예측 프로그램</title>
</head>
<body>
    <h2>로또 번호 예측 프로그램</h2>
    <script>
        'use strict';

        function lottoNum(){
            let lotto = [];
            let i = 0;
            while(i < 6){
                let n = Math.floor(Math.random()*45)+1;
                if(!sameNum(n)){
                    lotto.push(n);
                    i++;
                }
            }
            function sameNum(n){
                for(let j = 0; j < lotto.length; j++){
                    if(n === lotto[j]){
                        return true;
                    }
                }
                return false;
            }
            return lotto;
        }

        function sortNumber(a, b){
            return a-b;
        }

        alert(lottoNum().sort(sortNumber));

    </script>
</body>
</html>
